<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies World</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
 
  <header class="header">
    <div class="header-container">
      <div class="header-left">
        <button class="menu-btn">☰</button>
        <div class="logo">
          <span class="logo-icon">▶</span>
          <span class="logo-text">Vortex</span>
        </div>
      </div>

      <div class="header-center">
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search" oninput="handleSearch()">
          <button class="search-btn">🔍</button>
        </div>
        <button class="voice-search-btn">🎤</button>
      </div>

      <div class="header-right">
        <button class="icon-btn">📹</button>
        <button class="icon-btn">🔔</button>
        <div class="user-avatar">S</div>
      </div>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-item active" onclick="showSection('home')">
      <span class="item-icon">🏠</span>
      <span class="item-text">Home</span>
    </div>
    <div class="sidebar-item" onclick="showSection('videos')">
      <span class="item-icon">🎞️</span>
      <span class="item-text">Shorts</span>
    </div>
    <div class="sidebar-item">
      <span class="item-icon">📺</span>
      <span class="item-text">Subscriptions</span>
    </div>
    <hr class="sidebar-divider">
    <div class="sidebar-item">
      <span class="item-icon">📁</span>
      <span class="item-text">Library</span>
    </div>
    <div class="sidebar-item">
      <span class="item-icon">🕒</span>
      <span class="item-text">History</span>
    </div>
  </aside>

 
  <main class="main-content">
    <div class="chips-container">
      <button class="chip active" onclick="filterVideosByTag('all')">All</button>
      <button class="chip" onclick="filterVideosByTag('trending')">Trending</button>
      <button class="chip" onclick="filterVideosByTag('music')">Music</button>
      <button class="chip" onclick="filterVideosByTag('gaming')">Gaming</button>
      <button class="chip" onclick="filterVideosByTag('news')">News</button>
      <button class="chip" onclick="filterVideosByTag('movies')">Movies</button>
      <button class="chip" onclick="filterVideosByTag('short')">Shorts</button>
    </div>

    <section id="home" class="section active">
      <div class="video-grid" id="homeVideoGrid">
        <!-- Videos will be injected here -->
      </div>
    </section>

    <section id="videos" class="section">
      <div class="video-grid" id="allVideosGrid">
        <!-- Videos will be injected here -->
      </div>
    </section>
  </main>


  <div id="videoModal" class="modal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()">&times;</button>
      <div class="video-player" id="videoPlayer">
        <div style="text-align: center;">
          <div class="loading"></div>
          <p>Loading video...</p>
        </div>
      </div>
      <div class="video-controls">
        <button class="control-btn" onclick="playVideo()">▶️ Play</button>
        <button class="control-btn" onclick="shareVideo()">📤 Share</button>
        <button class="control-btn" onclick="downloadVideo()">⬇️ Download</button>
      </div>
      <div id="videoDetails">
        <h3 id="modalTitle"></h3>
        <p id="modalDescription"></p>
        <div id="modalTags"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
